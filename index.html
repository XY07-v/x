<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Gestión Manpower</title>
    <style>
        /* CSS: El diseño visual */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        .filtros { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 16px; }
        button { padding: 12px 20px; background: #002d5a; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Tabla */
        .tabla-con { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #002d5a; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }
        
        /* Iconos de tu regla de negocio */
        .v { color: green; font-weight: bold; font-size: 1.2em; } /* El -1 */
        .x { color: red; font-weight: bold; font-size: 1.2em; }   /* El vacío */
    </style>
</head>
<body>

<div class="card">
    <h2>📊 Gestión Operativa (Lunes a Sábado)</h2>
    <div class="filtros">
        <input type="text" id="buscNombre" placeholder="Nombre del empleado...">
        <button onclick="filtrar()">🔍 BUSCAR</button>
    </div>

    <div class="tabla-con">
        <table id="miTabla">
            <thead>
                <tr>
                    <th>MES</th>
                    <th>FECHA</th>
                    <th>DIA</th>
                    <th>ID</th>
                    <th>NOMBRE EMPLEADO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr>
                    <td>MARZO</td>
                    <td>2026-03-19</td>
                    <td>JUEVES</td>
                    <td>1001</td>
                    <td>EJEMPLO CARGA COMBINADA</td>
                    <td><span class="v">✔️</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    /* JAVASCRIPT: La lógica de búsqueda (sustituye al proceso manual) */
    function filtrar() {
        const input = document.getElementById("buscNombre").value.toUpperCase();
        const filas = document.getElementById("miTabla").getElementsByTagName("tr");
        
        for (let i = 1; i < filas.length; i++) {
            const nombre = filas[i].cells[4] ? filas[i].cells[4].innerText.toUpperCase() : "";
            filas[i].style.display = nombre.includes(input) ? "" : "none";
        }
    }

    // Buscar automáticamente al presionar Enter
    document.getElementById("buscNombre").addEventListener("keypress", (e) => {
        if (e.key === "Enter") filtrar();
    });
</script>

</body>
</html>
