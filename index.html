<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Cumplimiento Manpower</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --manpower-blue: #0046ad;
            --success: #27ae60;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--manpower-blue); text-align: center; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--manpower-blue); color: white; padding: 12px; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; text-align: center; }
        .mes-cell { font-weight: bold; color: var(--manpower-blue); text-align: left; }
        .chulo { color: var(--success); font-size: 1.4rem; font-weight: bold; }
        .equis { color: var(--danger); font-size: 1.4rem; font-weight: bold; }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Seguimiento y Cumplimiento</h1>
    <div id="loader" class="loading">Cargando datos desde Excel...</div>
    
    <table id="tabla-datos" style="display:none;">
        <thead>
            <tr>
                <th>MES</th>
                <th>FECHA / DÍA</th>
                <th>ESTADO</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <div class="footer">
        * Lunes a Sábado. Domingos y festivos no incluidos.<br>
        -1 = Positivo (✔️) | Vacío = Déficit (❌)
    </div>
</div>

<script>
    // URL de tu archivo (convertida para descarga directa de datos)
    const urlExcel = "https://manpowergroupcolombia-my.sharepoint.com/:x:/g/personal/edwar_vanegas_manpowercolombia_com/IQCFQVQEx44GSZgIu9VIZ2dGARiJqn6nn9_psT0h1Cvxl_8?download=1";

    async function cargarExcel() {
        try {
            const response = await fetch(urlExcel);
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });

            // Leemos la primera hoja
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Convertimos a JSON (defval asegura que los vacíos no se omitan)
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

            renderizarTabla(jsonData);
        } catch (error) {
            console.error("Error al cargar el archivo:", error);
            document.getElementById('loader').innerText = "Error al conectar con el Excel. Asegúrate de que el enlace sea público.";
        }
    }

    function renderizarTabla(data) {
        const tbody = document.getElementById('cuerpo-tabla');
        const loader = document.getElementById('loader');
        const tabla = document.getElementById('tabla-datos');

        data.forEach(fila => {
            const tr = document.createElement('tr');
            
            // Suponiendo columnas 'MES' y 'VALOR' (o similar según tu Excel)
            // Adaptamos la lógica de negocio solicitada
            const valorRaw = fila['VALOR'] || fila['Estado'] || ""; 
            const mes = fila['MES'] || "N/A";
            const dia = fila['FECHA'] || fila['DIA'] || "Sin fecha";

            // REGLA: -1 es positivo (chulo), Vacío es déficit (X)
            const esChulo = (valorRaw == -1 || valorRaw == "-1");
            const icono = esChulo ? "✔️" : "❌";
            const clase = esChulo ? "chulo" : "equis";

            tr.innerHTML = `
                <td class="mes-cell">${mes}</td>
                <td>${dia}</td>
                <td class="${clase}">${icono}</td>
            `;
            tbody.appendChild(tr);
        });

        loader.style.display = 'none';
        tabla.style.display = 'table';
    }

    // Iniciar carga
    cargarExcel();
</script>

</body>
</html>
