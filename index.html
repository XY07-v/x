<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Gestión Manpower</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f4f7f9;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 1200px;
            margin: auto;
        }
        h2 {
            color: #004a99;
            border-bottom: 3px solid #004a99;
            padding-bottom: 10px;
            text-align: center;
        }
        .info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #666;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background-color: white;
        }
        th {
            background-color: #004a99;
            color: white;
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        td {
            padding: 12px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f4f8;
        }
        /* TUS REGLAS DE COLOR */
        .positivo {
            color: #28a745; /* Verde */
            font-weight: bold;
            font-size: 1.4em;
        }
        .deficit {
            color: #dc3545; /* Rojo */
            font-weight: bold;
            font-size: 1.4em;
        }
        .mes-texto {
            font-weight: bold;
            text-align: left;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Reporte de Gestión: Lunes a Sábado</h2>
    <div class="info">
        <p><strong>Reglas aplicadas:</strong> -1 = <span class="positivo">✓</span> (Positivo) | Vacío = <span class="deficit">X</span> (Déficit)</p>
        <p>Los domingos y festivos no se contabilizan.</p>
    </div>

    <div id="tabla-reporte">
        <p style="text-align:center; color:#999;">Esperando actualización de datos desde SharePoint...</p>
    </div>
</div>

</body>
</html>
