<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Datos - Manpower</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        #tabla-contenedor { overflow-x: auto; margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #0046ad; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>Reporte de Datos (Lunes a Sábado)</h2>
    <div id="loading">Cargando datos y procesando tabla...</div>
    <div id="tabla-contenedor"></div>

    <script type="py">
        import pandas as pd
        import pyodide_http
        from pyscript import display
        
        # Permitir peticiones HTTP en el navegador
        pyodide_http.patch_all()

        url = "https://manpowergroupcolombia-my.sharepoint.com/:x:/g/personal/edwar_vanegas_manpowercolombia_com/IQCFQVQEx44GSZgIu9VIZ2dGAS0h1sEo0V-hJ812-oW8tys?e=o0J3Aa&download=1"

        try:
            # Leer CSV
            df = pd.read_csv(url, sep=';', dtype={'MES': str}, encoding='latin1')

            # --- TUS REGLAS ---
            df = df.fillna('X') # Vacío es déficit
            df = df.astype(str).replace(['-1', '-1.0'], '✓') # -1 es positivo

            # Mostrar en el HTML
            div_contenedor = document.getElementById("tabla-contenedor")
            div_contenedor.innerHTML = df.to_html(index=False)
            document.getElementById("loading").style.display = "none"
            
        except Exception as e:
            document.getElementById("loading").innerHTML = f"Error: {e}"
    </script>
</body>
</html>
