<script>
    // 1. Tu URL original de SharePoint
    const sharepointUrl = "https://manpowergroupcolombia-my.sharepoint.com/:x:/g/personal/edwar_vanegas_manpowercolombia_com/IQCFQVQEx44GSZgIu9VIZ2dGASEx4gTIU0C4loxlEx3MBAg?download=1";

    // 2. Usamos un proxy para evitar el error de "No se pudo acceder"
    const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(sharepointUrl);

    async function cargarExcel() {
        try {
            document.getElementById('status').innerText = "Conectando con SharePoint...";
            
            const response = await fetch(url);
            if (!response.ok) throw new Error("Error en la respuesta de red");
            
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

            generarTabla(jsonData);
            document.getElementById('status').innerText = "Datos cargados correctamente";
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerHTML = `
                <div style="color:red; font-weight:bold;">
                    ⚠️ Error de acceso. <br>
                    Causa: El firewall de tu empresa (Manpower) podría estar bloqueando el acceso externo.<br>
                    Sugerencia: Abre el enlace en una pestaña incógnito para verificar que sea 100% público.
                </div>`;
        }
    }

    function generarTabla(data) {
        let html = "<table><thead><tr>";
        if (data.length > 0) {
            Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);
            html += "</tr></thead><tbody>";

            data.forEach(fila => {
                html += "<tr>";
                Object.values(fila).forEach(valor => {
                    // Aplicando tus reglas: -1 es ✓ y vacío es X
                    if (valor === "" || valor === null || valor === undefined) {
                        html += `<td class="deficit">X</td>`;
                    } else if (valor == -1 || valor == "-1") {
                        html += `<td class="chulo">✓</td>`;
                    } else {
                        html += `<td>${valor}</td>`;
                    }
                });
                html += "</tr>";
            });
        }
        html += "</tbody></table>";
        document.getElementById('tabla-contenedor').innerHTML = html;
    }

    cargarExcel();
</script>
