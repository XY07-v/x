<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Gestión Manpower</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1300px; margin: auto; }
        h2 { color: #002d5a; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        .filtros { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            background: #e9ecef; 
            padding: 15px; 
            border-radius: 8px;
        }
        input { 
            padding: 12px; 
            border: 1px solid #ced4da; 
            border-radius: 6px; 
            flex: 1; 
            font-size: 16px;
        }
        button { 
            padding: 12px 25px; 
            background-color: #002d5a; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #004080; }

        .tabla-contenedor { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background-color: #002d5a; color: white; padding: 12px; text-align: left; font-size: 14px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #dee2e6; font-size: 13px; color: #333; }
        tr:hover { background-color: #f8f9fa; }

        /* Estilos para tus reglas de negocio */
        .v { color: #28a745; font-weight: bold; font-size: 1.2em; } /* Chulo para -1 */
        .x { color: #dc3545; font-weight: bold; font-size: 1.2em; } /* X para vacíos */
        
        .instrucciones { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 Gestión Operativa (Lunes a Sábado)</h2>
    <p class="instrucciones">Escribe el nombre del empleado y presiona buscar para filtrar los registros.</p>
    
    <div class="filtros">
        <input type="text" id="buscNombre" placeholder="Nombre del empleado (Ej: JUAN PEREZ)...">
        <button onclick="filtrarTabla()">🔍 BUSCAR</button>
    </div>

    <div class="tabla-contenedor">
        <table id="miTabla">
            <thead>
                <tr>
                    <th>MES</th>
                    <th>FECHA</th>
                    <th>DIA</th>
                    <th>ID</th>
                    <th>NOMBRE EMPLEADO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>MARZO</td>
                    <td>2026-03-19</td>
                    <td>JUEVES</td>
                    <td>1001</td>
                    <td>EJEMPLO CARGA MANUAL</td>
                    <td><span class="v">✔️</span></td>
                </tr>
                <tr>
                    <td>MARZO</td>
                    <td>2026-03-19</td>
                    <td>JUEVES</td>
                    <td>1002</td>
                    <td>REVISAR CONEXIÓN</td>
                    <td><span class="x">❌</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function filtrarTabla() {
        const input = document.getElementById("buscNombre");
        const filter = input.value.toUpperCase();
        const table = document.getElementById("miTabla");
        const tr = table.getElementsByTagName("tr");

        // Empezamos en 1 para saltar el encabezado
        for (let i = 1; i < tr.length; i++) {
            const tdNombre = tr[i].getElementsByTagName("td")[4]; // Columna de nombre
            if (tdNombre) {
                const txtValue = tdNombre.textContent || tdNombre.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }

    // Permitir buscar al presionar "Enter"
    document.getElementById("buscNombre").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            filtrarTabla();
        }
    });
</script>

</body>
</html>
