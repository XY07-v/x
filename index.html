<html lang="es">
<head>

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; font-family: sans-serif; 
            background: #050505; user-select: none; 
        }
        #l-s {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: flex; justify-content: center; align-items: center;

            border: 1px solid #222; background: #000; 
            color: #FF00FF; box-sizing: border-box; outline: none; font-size: 14px;
        }
        button { 
            background: #FF00FF; color: white; border: none; width: 100%;
            padding: 12px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }
        #a-c { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        header { background: #FF00FF; color: white; padding: 3px 10px; }
        header h1 { margin: 0; font-size: 11px; font-weight: bold; }
        iframe { border: none; width: 100%; height: 100%; flex-grow: 1; }
        #e { color: #FF00FF; font-size: 10px; margin-top: 10px; height: 12px; letter-spacing: 1px; }

</head>
<body oncontextmenu="return false;">

    <div id="l-s">
        <div class="b-x">

        <header><h1>CMR Y4</h1></header>

        // Usuario: Y42025 | Pass: Apiai2025*
        const _0x1 = "WTQyMDI1"; 
        const _0x2 = "QXBpYWkyMDI1Kg==";

        function v() {
